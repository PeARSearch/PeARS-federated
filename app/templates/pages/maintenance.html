{% extends "base/base.html" %}
{% block title %}Under Maintenance{% endblock %}
{% block body %}
<div class="content-prose text-center">
  <h3>This PeARS instance is currently under maintenance!</h3>
  {% if session.get('theme') == 'dark' %}
    <img src="{{ url_for('static', filename='sad_pears_dark.png')}}" width="200" alt="Under maintenance">
  {% else %}
    <img src="{{ url_for('static', filename='sad_pears.png')}}" width="200" alt="Under maintenance">
  {% endif %}
</div>
{% endblock %}
