{% extends admin_base_template %}

{% block brand %}
    <a class="navbar-brand" href="{{ url_for('search.index')}}">
        <img src="{{ url_for('static', filename='pears_round.png')}}" height="25" alt="PeARS" style="display:inline; vertical-align:middle; margin-right:5px;">
        PeARS
    </a>
{% endblock %}

{% block tail %}
    {{ super() }}
    <style>
        body {
            font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
            background-color: #FAFAF8;
        }

        .container {
            max-width: 100%;
            width: 100%;
            padding: 0 20px;
        }

        .navbar-dark, .navbar-inverse {
            border: none;
            border-radius: 0;
        }

        .navbar-dark.bg-dark, .navbar-inverse {
            background-color: #2D3250 !important;
        }

        .navbar-dark .navbar-brand {
            color: #EDECE8;
        }

        .navbar-dark .navbar-brand:hover {
            color: #fff;
        }

        .navbar-dark .navbar-nav .nav-link {
            color: #B0AFAA;
        }

        .navbar-dark .navbar-nav .nav-link:hover,
        .navbar-dark .navbar-nav .active > .nav-link {
            color: #fff;
        }

        /* Tables */
        .table {
            table-layout: fixed;
            width: 100%;
        }

        .table td, .table th {
            padding: 6px 10px;
            vertical-align: top;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .table th a { color: #E67E22; }

        .table th:nth-child(1), .table td:nth-child(1) { width: 30px; }
        .table th:nth-child(2), .table td:nth-child(2) { width: 60px; }

        .table td:last-child {
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .table td:nth-child(3) {
            word-break: break-all;
            white-space: normal;
        }

        .table-striped > tbody > tr:nth-of-type(odd) { background-color: #F3F1EE; }
        .table-striped > tbody > tr:hover { background-color: #FDEBD0; }

        /* Buttons */
        .btn-primary { background-color: #E67E22; border-color: #CF6D17; border-radius: 6px; }
        .btn-primary:hover { background-color: #CF6D17; }
        .btn-default { border-radius: 6px; }

        input.form-control, select.form-control, textarea.form-control {
            border-radius: 6px;
        }

        .nav-tabs > li > a { border-radius: 6px 6px 0 0; }

        .icon-pencil, .icon-trash, .glyphicon { font-size: 12px; }

        /* Forms (create/edit): constrain width */
        .admin-form {
            max-width: 650px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label,
        .control-label {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
            color: #2D3250;
        }

        .form-control {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #E2E0DC;
            font-size: 14px;
        }

        .form-control:focus {
            border-color: #E67E22;
            box-shadow: 0 0 0 2px rgba(230, 126, 34, 0.2);
        }

        .form-control[readonly] {
            background: #F3F1EE;
        }

        /* Submit buttons area */
        .form-group:last-child {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #E2E0DC;
        }

        input[type="submit"], .btn-warning {
            border-radius: 6px;
            padding: 8px 20px;
            font-size: 14px;
        }

        input[type="submit"].btn-primary,
        .btn-primary {
            background-color: #E67E22;
            border-color: #CF6D17;
            color: #fff;
        }

        input[type="submit"].btn-primary:hover,
        .btn-primary:hover {
            background-color: #CF6D17;
        }

        .btn-danger {
            background-color: #E74C3C;
            border-color: #C0392B;
            border-radius: 6px;
        }

        .btn-danger:hover {
            background-color: #C0392B;
        }

        /* Help text */
        .help-block {
            font-size: 12px;
            color: #7077A1;
            margin-top: 2px;
        }

        /* Submit row */
        .submit-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-secondary {
            border-radius: 6px;
            font-size: 13px;
        }

        .select2-results { max-height: 400px !important; }
        .select2-container { width: 400px !important; }
    </style>
{% endblock %}
