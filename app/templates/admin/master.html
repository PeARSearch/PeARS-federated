{% extends admin_base_template %}

{% block brand %}
    <a class="navbar-brand" href="{{ url_for('search.index')}}">
        <img src="{{ url_for('static', filename='pears_round.png')}}" height="25" alt="PeARS" style="display:inline; vertical-align:middle; margin-right:5px;">
        PeARS
    </a>
{% endblock %}

{% block tail %}
    {{ super() }}
    <style>
        body {
            font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
            background-color: #FAFAF8;
        }

        .container {
            max-width: 100%;
            width: 100%;
            padding: 0 20px;
        }

        /* Navbar: match main site's light style */
        .navbar, .navbar-dark, .navbar-inverse {
            border: none;
            border-radius: 0;
            border-bottom: 1px solid #E2E0DC;
            box-shadow: none;
        }

        .navbar-dark.bg-dark, .navbar-inverse {
            background-color: #FAFAF8 !important;
        }

        .navbar-dark .navbar-brand {
            color: #2D3250;
            font-weight: 600;
            font-size: 18px;
        }

        .navbar-dark .navbar-brand:hover {
            color: #2D3250;
        }

        .navbar-dark .navbar-nav .nav-link {
            color: #5A5A5A;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: background-color 0.15s, color 0.15s;
        }

        .navbar-dark .navbar-nav .nav-link:hover {
            color: #2D3250;
            background-color: #F3F1EE;
        }

        .navbar-dark .navbar-nav .active > .nav-link {
            color: #2D3250;
            font-weight: 600;
        }

        .navbar-dark .navbar-toggler {
            border-color: #E2E0DC;
        }

        .navbar-dark .navbar-toggler-icon {
            filter: invert(1);
        }

        /* Tables */
        .table {
            table-layout: fixed;
            width: 100%;
        }

        .table td, .table th {
            padding: 6px 10px;
            vertical-align: top;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .table th a { color: #E67E22; }

        .table th:nth-child(1), .table td:nth-child(1) { width: 30px; }
        .table th:nth-child(2), .table td:nth-child(2) { width: 60px; }

        .table td:last-child {
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .table td:nth-child(3) {
            word-break: break-all;
            white-space: normal;
        }

        .table-striped > tbody > tr:nth-of-type(odd) { background-color: #F3F1EE; }
        .table-striped > tbody > tr:hover { background-color: #FDEBD0; }

        /* Buttons */
        .btn-primary { background-color: #E67E22; border-color: #CF6D17; border-radius: 6px; }
        .btn-primary:hover { background-color: #CF6D17; }
        .btn-default { border-radius: 6px; }

        input.form-control, select.form-control, textarea.form-control {
            border-radius: 6px;
        }

        .nav-tabs > li > a { border-radius: 6px 6px 0 0; }

        .icon-pencil, .icon-trash, .glyphicon { font-size: 12px; }

        /* Forms (create/edit): constrain width, card-like container */
        .admin-form {
            max-width: 620px;
            background: #fff;
            border: 1px solid #E2E0DC;
            border-radius: 10px;
            padding: 28px 32px;
            margin: 16px auto 0;
        }

        .admin-form fieldset {
            border: none;
            padding: 0;
            margin: 0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label,
        .col-form-label,
        .control-label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 3px;
            padding: 0;
            color: #2D3250;
        }

        .form-control {
            display: block;
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #E2E0DC;
            font-size: 14px;
            background: #FAFAF8;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-control:focus {
            border-color: #E67E22;
            box-shadow: 0 0 0 2px rgba(230, 126, 34, 0.15);
            background: #fff;
            outline: none;
        }

        .form-control[readonly] {
            background: #F3F1EE;
            color: #7077A1;
        }

        select.form-control {
            appearance: auto;
        }

        /* Nav tabs (List / Create) */
        .nav-tabs {
            border-bottom: 2px solid #E2E0DC;
            margin-bottom: 0;
        }

        .nav-tabs .nav-link {
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            color: #7077A1;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 0;
        }

        .nav-tabs .nav-link:hover {
            color: #2D3250;
            border-bottom-color: #B0AFAA;
        }

        .nav-tabs .nav-link.active {
            color: #E67E22;
            border-bottom-color: #E67E22;
            background: transparent;
        }

        /* Center tabs only when followed by a form (create/edit pages) */
        .nav-tabs:has(+ .admin-form),
        .nav-tabs:has(+ form.admin-form) {
            max-width: 620px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Submit buttons area */
        .admin-form hr {
            border-color: #E2E0DC;
            margin: 20px 0 16px;
        }

        .submit-row {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            align-items: center;
        }

        .submit-row input[type="submit"],
        .submit-row .btn {
            font-size: 13px;
            padding: 7px 14px;
            white-space: nowrap;
        }

        input[type="submit"], .btn-warning {
            border-radius: 6px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        input[type="submit"].btn-primary,
        .btn-primary {
            background-color: #E67E22;
            border-color: #CF6D17;
            color: #fff;
        }

        input[type="submit"].btn-primary:hover,
        .btn-primary:hover {
            background-color: #CF6D17;
        }

        .btn-danger {
            background-color: #E74C3C;
            border-color: #C0392B;
            border-radius: 6px;
        }

        .btn-danger:hover {
            background-color: #C0392B;
        }

        .btn-secondary, .btn-warning {
            border-radius: 6px;
            font-size: 13px;
        }

        /* Help text */
        .help-block, .form-text {
            font-size: 12px;
            color: #7077A1;
            margin-top: 2px;
        }

        .select2-results { max-height: 400px !important; }
        .select2-container { width: 100% !important; }
    </style>
{% endblock %}
