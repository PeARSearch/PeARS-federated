{% extends 'admin/model/list.html' %}

{% block brand %}
    <a class="navbar-brand" href="{{ url_for('search.index')}}">
        <img src="{{ url_for('static', filename='pears_round.png')}}" height="25" alt="PeARS" style="display:inline; vertical-align:middle; margin-right:5px;">
        PeARS
    </a>
{% endblock %}

{% block page_body %}
    <div class="container-fluid" style="padding: 0 20px;">
    {{ super() }}
    <style>
        .select2-results {
            max-width: 400px !important;
        }

        .select2-container {
            width: 400px !important;
        }

        /* Override Flask-Admin / Bootstrap 4 styles for cleaner look */
        body {
            font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
            background-color: #FAFAF8;
        }

        .navbar-default, .navbar {
            border-radius: 0;
        }

        /* Flask-Admin navbar */
        .navbar-inverse {
            background-color: #2D3250;
            border: none;
            border-radius: 0;
        }

        .navbar-inverse .navbar-brand {
            color: #EDECE8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .navbar-inverse .navbar-brand:hover {
            color: #fff;
        }

        .navbar-inverse .navbar-nav > li > a {
            color: #B0AFAA;
        }

        .navbar-inverse .navbar-nav > li > a:hover,
        .navbar-inverse .navbar-nav > li.active > a {
            color: #fff;
        }

        /* Table layout */
        .table {
            table-layout: fixed;
            width: 100%;
        }

        .table td, .table th {
            padding: 6px 10px;
            vertical-align: top;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .table th a {
            color: #E67E22;
        }

        /* Column widths — checkbox, actions, url, title, pod, notes */
        .table th:nth-child(1),
        .table td:nth-child(1) { width: 30px; }

        .table th:nth-child(2),
        .table td:nth-child(2) { width: 60px; }

        /* Notes column: truncate long text */
        .table td:last-child {
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* URL column: allow wrapping */
        .table td:nth-child(3) {
            word-break: break-all;
            white-space: normal;
        }

        /* Better row striping */
        .table-striped > tbody > tr:nth-of-type(odd) {
            background-color: #F3F1EE;
        }

        .table-striped > tbody > tr:hover {
            background-color: #FDEBD0;
        }

        /* Buttons */
        .btn-primary, .btn-default {
            border-radius: 6px;
        }

        .btn-primary {
            background-color: #E67E22;
            border-color: #CF6D17;
        }

        .btn-primary:hover {
            background-color: #CF6D17;
        }

        /* Search bar */
        input.form-control {
            border-radius: 6px;
        }

        /* Nav tabs */
        .nav-tabs > li > a {
            border-radius: 6px 6px 0 0;
        }

        /* Action icons */
        .icon-pencil, .icon-trash, .glyphicon {
            font-size: 12px;
        }

        /* Force full width */
        .container {
            max-width: 100%;
            width: 100%;
            padding: 0 20px;
        }
    </style>
    </div>
{% endblock %}
